<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dashboard Backtest</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    h1 { margin-bottom: 10px; }
    #summary { margin-bottom: 20px; }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>Resultats del Backtest</h1>

  <label for="symbol">Parell:</label>
<select id="symbol">
  <option>BTC-USDT</option>
  <option>SUI-USDT</option>
  <option>SOL-USDT</option>
  <option>XRP-USDT</option>
  <option>AVAX-USDT</option>
  <option>APT-USDT</option>
  <option>INJ-USDT</option>
  <option>SEI-USDT</option>
  <option>ADA-USDT</option>
  <option>LINK-USDT</option>
  <option>BNB-USDT</option>
  <option>ETH-USDT</option>
  <option>NEAR-USDT</option>
  <option>HBAR-USDT</option>
  <option>RENDER-USDT</option>
  <option>ASTER-USDT</option>
  <option>BCH-USDT</option>
</select>

  <div class="row">
  <label>Timeframe:</label>
  <select id="timeframe">
    <option>1m</option>
    <option>5m</option>
    <option selected>15m</option>
    <option>1h</option>
    <option>4h</option>
    <option>1d</option>
  </select>

  <label>Període:</label>
  <select id="period">
    <option value="1d">1 dia</option>
    <option value="1w">1 setmana</option>
    <option value="1m">1 mes</option>
  </select>
</div>

<div class="row">
  <label>Retrocés (%):</label>
  <input type="number" id="retracement" value="25" min="0" max="100">

  <label>TP (%):</label>
  <input type="number" id="tp" value="0.6" step="0.1" min="0">

  <label>SL Mode:</label>
  <select id="slMode">
    <option value="thirdCandle">Tercera vela</option>
    <option value="symmetric">Simètric</option>
  </select>
</div>

  <button onclick="runBacktest()">Executar Backtest</button>

  <h2>Resum</h2>
  <div id="summary">Carregant...</div>

  <h2>Gràfic Win / Loss / Neutral</h2>
  <canvas id="pieChart" width="300" height="300"></canvas>

  <script>
    let chart;

    async function loadStats() {
      const res = await fetch("/backtest/stats");
      const data = await res.json();
      const s = data.stats;

      document.getElementById("summary").innerHTML = `
        <strong>Total:</strong> ${s.total}<br>
        <strong>Wins:</strong> ${s.wins}<br>
        <strong>Losses:</strong> ${s.losses}<br>
        <strong>Neutrals:</strong> ${s.neutrals}<br>
        <strong>Winrate:</strong> ${s.winrate}%
      `;

      if (chart) chart.destroy();

      chart = new Chart(document.getElementById("pieChart"), {
        type: "pie",
        data: {
          labels: ["Wins", "Losses", "Neutrals"],
          datasets: [{
            data: [s.wins, s.losses, s.neutrals],
            backgroundColor: ["#4caf50", "#f44336", "#9e9e9e"]
          }]
        }
      });
    }

  async function runBacktest() {
  const symbol = document.getElementById("symbol").value;
  const timeframe = document.getElementById("timeframe").value;
  const period = document.getElementById("period").value;

  const retracement = Number(document.getElementById("retracement").value);
  const tp = Number(document.getElementById("tp").value);
  const slMode = document.getElementById("slMode").value;

  await fetch("/backtest/run", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      symbol,
      timeframe,
      period,
      retracement,
      tp,
      slMode
    })
  });

  loadStats();
}


  </script>

</body>
</html>
