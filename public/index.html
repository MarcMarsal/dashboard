<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dashboard Backtest</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    h1 { margin-bottom: 10px; }
    #summary { margin-bottom: 20px; }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>Resultats del Backtest</h1>

  <label for="symbol">Parell:</label>
<select id="symbol">
  <option>BTC-USDT</option>
  <option>SUI-USDT</option>
  <option>SOL-USDT</option>
  <option>XRP-USDT</option>
  <option>AVAX-USDT</option>
  <option>APT-USDT</option>
  <option>INJ-USDT</option>
  <option>SEI-USDT</option>
  <option>ADA-USDT</option>
  <option>LINK-USDT</option>
  <option>BNB-USDT</option>
  <option>ETH-USDT</option>
  <option>NEAR-USDT</option>
  <option>HBAR-USDT</option>
  <option>RENDER-USDT</option>
  <option>ASTER-USDT</option>
  <option>BCH-USDT</option>
</select>

  <div class="row">
  <label>Timeframe:</label>
  <select id="timeframe">
    <option>1m</option>
    <option>5m</option>
    <option selected>15m</option>
    <option>1h</option>
    <option>4h</option>
    <option>1d</option>
  </select>

  <label>Període:</label>
  <select id="period">
    <option value="1d">1 dia</option>
    <option value="1w">1 setmana</option>
    <option value="1m">1 mes</option>
  </select>
</div>

<div class="row">
  <label>Retrocés (%):</label>
  <input type="number" id="retracement" value="25" min="0" max="100">

  <label>TP (%):</label>
  <input type="number" id="tp" value="0.6" step="0.1" min="0">

  <label>SL Mode:</label>
  <select id="slMode">
    <option value="thirdCandle">Tercera vela</option>
    <option value="symmetric">Simètric</option>
  </select>
</div>
<label>
  <input type="checkbox" id="showLines" />
  Show lines
</label>


  <button onclick="runBacktest()">Executar Backtest</button>

  <h2>Resum</h2>
  <div id="summary">Carregant...</div>

  <h2>Gràfic Win / Loss / Neutral</h2>
  
  <div style="width: 200px; height: 200px;">
    <canvas id="pieChart"></canvas>
  </div>

<h2>Classificació per trams horaris</h2>
<div id="segmentReport">Carregant...</div>

  <h2>Detall de les operacions</h2>
<div id="linesTable"></div>

 <script>
  let chart;
  // --- AFEGIR AQUI ---
  function getFranja(hour) {
    if (hour >= 9 && hour < 12) return "mati_eu";
    if (hour >= 12 && hour < 14) return "migdia_eu";
    if (hour >= 14 && hour < 16) return "pre_ws";
    if (hour >= 16 && hour < 18) return "tarda_eu";
    if (hour >= 18 && hour < 24) return "nit_eu";
    return "nit_matinada";
  }

  function getCellColor(alerts, wins, loses) {
    if (alerts === 0) return "#e0e0e0";

    const total = wins + loses;
    const winrate = total > 0 ? (wins / total) * 100 : 0;

    if (winrate >= 70) return "#4caf50";
    if (winrate >= 60) return "#81c784";
    if (winrate >= 50) return "#fff176";
    if (winrate >= 40) return "#ffb74d";
    return "#e57373";
  }
  // --- FI DE L’AFEGIT ---

  async function loadStats() {
    const res = await fetch("/backtest/stats");
    const data = await res.json();
    const s = data.stats;

    document.getElementById("summary").innerHTML = `
      <strong>Total:</strong> ${s.total}<br>
      <strong>Wins:</strong> ${s.wins}<br>
      <strong>Losses:</strong> ${s.losses}<br>
      <strong>Neutrals:</strong> ${s.neutrals}<br>
      <strong>Winrate:</strong> ${s.winrate}%
    `;

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("pieChart"), {
      type: "pie",
      data: {
        labels: ["Wins", "Losses", "Neutrals"],
        datasets: [{
          data: [s.wins, s.losses, s.neutrals],
          backgroundColor: ["#4caf50", "#f44336", "#9e9e9e"]
        }]
      }
    });
  }

  async function runBacktest() {
    const symbol = document.getElementById("symbol").value;
    const timeframe = document.getElementById("timeframe").value;
    const period = document.getElementById("period").value;

    const retracement = Number(document.getElementById("retracement").value);
    const tpPercent = Number(document.getElementById("tp").value);
    const slMode = document.getElementById("slMode").value;

    const now = Date.now();
    let start;

    if (period === "1d") start = now - 1 * 24 * 60 * 60 * 1000;
    if (period === "1w") start = now - 7 * 24 * 60 * 60 * 1000;
    if (period === "1m") start = now - 30 * 24 * 60 * 60 * 1000;

    const end = now;

    await fetch("/backtest/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        symbol,
        timeframe,
        start,
        end,
        retracement,
        tpPercent,
        slMode
      })
    });

    loadStats();
   
    loadSegmentReport();

  }

  // opcional: carregar stats en entrar
  loadStats();
</script>
<script>
  document.getElementById("showLines").addEventListener("change", async (e) => {
    const container = document.getElementById("linesTable");

    if (!e.target.checked) {
      container.innerHTML = "";
      return;
    }

    const res = await fetch("/backtest/results");
    const rows = await res.json();

    if (!rows.length) {
      container.innerHTML = "<p>No hi ha dades.</p>";
      return;
    }

    let html = `
      <table border="1" cellpadding="5" cellspacing="0">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Entrada?</th>

            <th>Tipo</th>
            <th>Entry</th>
            <th>TP</th>
            <th>SL</th>
            <th>Resultat</th>
            <th>Touched TP</th>
            <th>Touched SL</th>
          </tr>
        </thead>
        <tbody>
    `;

    for (const r of rows) {
      html += `
        <tr>
          <td>${r.timestamp_es}</td>
          <td>${r.is_entry ? "Sí" : "No"}</td>

          <td>${r.tipo}</td>
          <td>${r.entry_price ? Number(r.entry_price).toFixed(4) : "-"}</td>
          <td>${r.tp_price ? Number(r.tp_price).toFixed(4) : "-"}</td>
          <td>${r.sl_price ? Number(r.sl_price).toFixed(4) : "-"}</td>

          <td>${r.result}</td>
          <td>${r.touched_tp ? "Yes" : "No"}</td>
          <td>${r.touched_sl ? "Yes" : "No"}</td>
        </tr>
      `;
    }

    html += "</tbody></table>";
    container.innerHTML = html;
  });

  

</script>
<script>
async function loadSegmentReport() {
  const res = await fetch("/backtest/report");
  const rows = await res.json();

  if (!rows.length) {
    document.getElementById("segmentReport").innerHTML = "<p>No hi ha dades.</p>";
    return;
  }

  let html = `
    <table border="1" cellpadding="5" cellspacing="0">
      <thead>
        <tr>
          <th>Segment</th>
          <th>Total senyals</th>
          <th>Entrades</th>
          <th>No entrades</th>
          <th>Wins</th>
          <th>Losses</th>
          <th>Neutrals</th>
          <th>Winrate</th>
        </tr>
      </thead>
      <tbody>
  `;

  for (const r of rows) {
    const winrate = r.entries > 0 ? ((r.wins / r.entries) * 100).toFixed(1) : "0";

    html += `
      <tr>
        <td>${r.hour_segment}</td>
        <td>${r.total_signals}</td>
        <td>${r.entries}</td>
        <td>${r.no_entries}</td>
        <td>${r.wins}</td>
        <td>${r.losses}</td>
        <td>${r.neutrals}</td>
        <td>${winrate}%</td>
      </tr>
    `;
  }

  html += "</tbody></table>";
  document.getElementById("segmentReport").innerHTML = html;
}

  // --------------------------------------------------
// NOVA TAULA: ACTIVITAT PER DIA I FRANJA (1 SETMANA)
// --------------------------------------------------

async function loadWeeklyHeatmap() {
  const period = document.getElementById("period").value;
  if (period !== "1w") return;

  const res = await fetch("/backtest/results");
  const rows = await res.json();

  if (!rows.length) return;

  const avui = dayjs();
  const dies = [];
  for (let i = 7; i >= 0; i--) {
    dies.push(avui.subtract(i, "day").format("DD/MM"));
  }

  const franges = [
    "mati_eu",
    "migdia_eu",
    "pre_ws",
    "tarda_eu",
    "nit_eu",
    "nit_matinada"
  ];

  const taula = {};
  franges.forEach(f => {
    taula[f] = {};
    dies.forEach(d => {
      taula[f][d] = { alerts: 0, wins: 0, loses: 0 };
    });
  });

  rows.forEach(r => {
    const date = dayjs(r.timestamp_es, "DD/MM/YYYY HH:mm:ss");
    const dia = date.format("DD/MM");
    const franja = r.hour_segment;

    if (dies.includes(dia) && franges.includes(franja)) {
      taula[franja][dia].alerts++;
      if (r.result === "WIN") taula[franja][dia].wins++;
      if (r.result === "LOSS") taula[franja][dia].loses++;
    }
  });

  let html = `
    <h2>Heatmap última setmana</h2>
    <table border="1" cellpadding="5" cellspacing="0" style="text-align:center;">
      <thead>
        <tr>
          <th>Franja</th>
          ${dies.map(d => `<th>${d}</th>`).join("")}
        </tr>
      </thead>
      <tbody>
  `;

  franges.forEach(f => {
    html += `<tr><td><b>${f}</b></td>`;
    dies.forEach(d => {
      const cell = taula[f][d];
      const color = getCellColor(cell.alerts, cell.wins, cell.loses);
      html += `<td style="background:${color};">${cell.alerts} / ${cell.wins} / ${cell.loses}</td>`;
    });
    html += `</tr>`;
  });

  html += "</tbody></table>";

  document.getElementById("segmentReport").innerHTML += html;
}
</script>
  
</body>
</html>
